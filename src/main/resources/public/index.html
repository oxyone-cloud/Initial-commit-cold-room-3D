<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OxyONE | Algérie 69 Wilayas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00d2ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #gui { position: absolute; top: 10px; left: 10px; background: rgba(0, 20, 40, 0.95); padding: 20px; border-left: 4px solid #00d2ff; width: 320px; z-index: 100; border-radius: 0 10px 10px 0; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-height: 95vh; overflow-y: auto; }
        
        #clock-panel { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            background: rgba(0, 20, 40, 0.85); 
            padding: 10px 20px; 
            border-right: 4px solid #00d2ff; 
            z-index: 100; 
            border-radius: 10px 0 0 10px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            text-align: right;
        }
        #clock-time { font-size: 1.8em; font-weight: bold; color: #fff; font-family: monospace; letter-spacing: 2px; }
        #clock-date { font-size: 0.75em; text-transform: uppercase; color: #00d2ff; letter-spacing: 1px; margin-top: 2px; opacity: 0.8; }

        .display-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 5px; margin-bottom: 12px; text-align: center; border: 1px solid rgba(0,210,255,0.3); }
        .main-val { font-size: 1.5em; font-weight: bold; color: #fff; }
        .sub-label { font-size: 0.65em; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        .control-group { margin-bottom: 10px; }
        .val-badge { float: right; background: #00d2ff; color: #050505; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8em; }
        select { width: 100%; background: #111; color: #00d2ff; border: 1px solid #00d2ff; padding: 8px; border-radius: 4px; margin-top: 5px; cursor: pointer; font-family: inherit; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00d2ff; margin-top: 5px; }
        button { background: #00d2ff; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; border-radius: 5px; color: #050505; transition: 0.3s; }
        #nav-pad { position: absolute; bottom: 30px; right: 30px; display: grid; grid-template-columns: repeat(3, 55px); grid-gap: 8px; }
        .nav-btn { width: 55px; height: 55px; border: 2px solid #00d2ff; color: #00d2ff; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,210,255,0.1); font-weight: bold; border-radius: 8px; }
        
        .admin-panel { background: rgba(5, 10, 20, 0.98); border: 2px solid #ffaa00; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .admin-title { color: #ffaa00; font-size: 0.85em; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }
        .stat-row { display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 5px; border-bottom: 1px solid rgba(255,170,0,0.1); padding-bottom: 5px; }
    </style>
</head>
<body>

<div id="clock-panel">
    <div id="clock-time">00:00:00</div>
    <div id="clock-date">Chargement...</div>
</div>

<div id="gui">
    <h2 style="margin:0; font-size: 1.2em; letter-spacing: 2px;">OxyONE 3D</h2>
    <p style="font-size: 0.6em; margin: 5px 0 15px 0; color: #aaa;">Startup Labellisée@2021 | Ministère de l'Économie</p>
    
    <div class="control-group">
        <label style="font-size: 0.8em; opacity: 0.8;">📍 LOCALISATION (WILAYA)</label>
        <select id="wilaya-select"></select>
    </div>

    <div class="control-group">
        <label style="font-size: 0.8em; opacity: 0.8;">🥩 CATÉGORIE DE CONSERVATION</label>
        <select id="category-select" onchange="onCategoryChange()">
            <option value="viande_rouge">Viande Rouge (0°C à +2°C)</option>
            <option value="viande_blanche">Viande Blanche (+1°C à +3°C)</option>
            <option value="fruits_legumes">Fruits & Légumes (+4°C à +8°C)</option>
            <option value="produits_laitiers">Produits Laitiers (+2°C à +6°C)</option>
            <option value="poissons">Poissons & Crustacés (0°C à +2°C)</option>
            <option value="congele">Produits Congelés (-18°C à -25°C)</option>
        </select>
    </div>

    <div class="control-group">
        <label style="font-size: 0.8em; opacity: 0.8;">❄️ NOMBRE DE CHAMBRES FROIDES</label>
        <select id="rooms-select" onchange="calculate()">
            <option value="1">1 Chambre</option>
            <option value="2">2 Chambres</option>
            <option value="3">3 Chambres</option>
            <option value="4">4 Chambres</option>
            <option value="5">5 Chambres</option>
            <option value="6">6 Chambres</option>
            <option value="7">7 Chambres</option>
            <option value="8">8 Chambres</option>
            <option value="9">9 Chambres</option>
            <option value="10">10 Chambres</option>
        </select>
    </div>

    <div class="display-box">
        <div class="sub-label">Volume Global Total</div>
        <div class="main-val"><span id="total-v">90.00</span> m³</div>
    </div>

    <div class="display-box" style="border-color: rgba(255, 255, 255, 0.2);">
        <div class="sub-label">Surface des Parois (Unitaire)</div>
        <div class="main-val"><span id="total-s">126.00</span> m²</div>
    </div>

    <div class="display-box" id="temp-frame" style="border-color: #ff4444;">
        <div class="sub-label">Consigne Température</div>
        <div class="main-val" id="main-t">4°C</div>
    </div>
    
    <div class="control-group">
        <label>Temp. Positive <span class="val-badge" style="background:#ff4444" id="v-tp">4°C</span></label>
        <input type="range" id="tp" min="1" max="20" value="4" oninput="calculate()">
    </div>
    <div class="control-group">
        <label>Temp. Négative <span class="val-badge" style="background:#4444ff" id="v-tn">0°C</span></label>
        <input type="range" id="tn" min="-25" max="0" value="0" oninput="calculate()">
    </div>

    <hr style="opacity:0.1; margin: 15px 0;">

    <div class="control-group">
        <label>Largeur <span class="val-badge" id="v-w">6.0m</span></label>
        <input type="range" id="rw" min="1" max="20" step="0.5" value="6" oninput="calculate()">
    </div>
    <div class="control-group">
        <label>Hauteur <span class="val-badge" id="v-h">3.0m</span></label>
        <input type="range" id="rh" min="1" max="8" step="0.5" value="3" oninput="calculate()">
    </div>
    <div class="control-group">
        <label>Profondeur <span class="val-badge" id="v-d">5.0m</span></label>
        <input type="range" id="rd" min="1" max="20" step="0.5" value="5" oninput="calculate()">
    </div>

    <button onclick="generatePDF()">GÉNÉRER RAPPORT TECHNIQUE</button>

    <div class="admin-panel">
        <div class="admin-title">📊 Suivi Interne (Admin)</div>
        <div class="stat-row"><span>Utilisateurs Actifs :</span><span style="color: #fff; font-weight: bold;">142</span></div>
        <div class="stat-row"><span>Rapports PDF Générés :</span><span style="color: #fff; font-weight: bold;">389</span></div>
        <canvas id="internalAnalyticsChart" style="width: 100%; height: 110px; margin-top: 10px;"></canvas>
    </div>
</div>

<div id="nav-pad">
    <div style="grid-column: 2" class="nav-btn" onmousedown="move('up')" onmouseup="stop()">▲</div>
    <div class="nav-btn" onmousedown="move('left')" onmouseup="stop()">◀</div>
    <div class="nav-btn" onclick="fullReset()">RESET</div>
    <div class="nav-btn" onmousedown="move('right')" onmouseup="stop()">▶</div>
    <div style="grid-column: 2" class="nav-btn" onmousedown="move('down')" onmouseup="stop()">▼</div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clock-time').innerText = `${hours}:${minutes}:${seconds}`;
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('clock-date').innerText = now.toLocaleDateString('fr-FR', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    const wilayas = [
        "01 Adrar", "02 Chlef", "03 Laghouat", "04 Oum El Bouaghi", "05 Batna", "06 Béjaïa", "07 Biskra", "08 Béchar", 
        "09 Blida", "10 Bouira", "11 Tamanrasset", "12 Tébessa", "13 Tlemcen", "14 Tiaret", "15 Tizi Ouzou", "16 Alger", 
        "17 Djelfa", "18 Jijel", "19 Sétif", "20 Saïda", "21 Skikda", "22 Sidi Bel Abbès", "23 Annaba", "24 Guelma", 
        "25 Constantine", "26 Médéa", "27 Mostaganem", "28 M'Sila", "29 Mascara", "30 Ouargla", "31 Oran", "32 El Bayadh", 
        "33 Illizi", "34 Bordj Bou Arreridj", "35 Boumerdès", "36 El Tarf", "37 Tindouf", "38 Tissemsilt", "39 El Oued", 
        "40 Khenchela", "41 Souk Ahras", "42 Tipaza", "43 Mila", "44 Aïn Defla", "45 Naâma", "46 Aïn Témouchent", "47 Ghardaïa", 
        "48 Relizane", "49 Timimoun", "50 Bordj Badji Mokhtar", "51 Ouled Djellal", "52 Béni Abbès", "53 In Salah", 
        "54 In Guezzam", "55 Touggourt", "56 Djanet", "57 El M'Ghaier", "58 El Meniaa",
        "59 Aflou", "60 El Abiodh Sidi Cheikh", "61 El Aricha", "62 El Kantara", "63 Barika", "64 Bou Saâda", 
        "65 Bir El Ater", "66 Ksar El Boukhari", "67 Ksar Chellala", "68 Aïn Oussera", "69 Messaad"
    ];

    const select = document.getElementById('wilaya-select');
    wilayas.forEach(w => {
        let opt = document.createElement('option');
        opt.value = w; opt.innerHTML = w;
        select.appendChild(opt);
    });

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    
    // IMPORTANT : preserveDrawingBuffer permet de cloner l'image de l'écran pour le PDF
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const light = new THREE.DirectionalLight(0xffffff, 1); light.position.set(5, 10, 7); scene.add(light);

    const group = new THREE.Group();
    const material = new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.7, roughness: 0.2 });
    const chamber = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), material);
    group.add(chamber);
    const door = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.7, 0.3), new THREE.MeshStandardMaterial({color: 0x111111}));
    door.position.set(0.501, -0.1, 0); group.add(door);
    scene.add(group);
    scene.add(new THREE.GridHelper(50, 50, 0x00d2ff, 0x111111));
    camera.position.set(12, 8, 12); camera.lookAt(0,0,0);

    let vX = 0, vY = 0;
    function move(d) {
        if(d==='up') vX = -0.04; if(d==='down') vX = 0.04;
        if(d==='left') vY = -0.04; if(d==='right') vY = 0.04;
    }
    function stop() { vX = 0; vY = 0; }

    function fullReset() {
        group.rotation.set(0,0,0);
        document.getElementById('category-select').value = "viande_rouge";
        document.getElementById('tp').value = 1; 
        document.getElementById('tn').value = 0;
        document.getElementById('rw').value = 6; document.getElementById('rh').value = 3; document.getElementById('rd').value = 5;
        document.getElementById('wilaya-select').value = "16 Alger";
        document.getElementById('rooms-select').value = "1";
        calculate();
    }

    function onCategoryChange() {
        const cat = document.getElementById('category-select').value;
        if (cat === "viande_rouge") { document.getElementById('tp').value = 1; document.getElementById('tn').value = 0; }
        else if (cat === "viande_blanche") { document.getElementById('tp').value = 2; document.getElementById('tn').value = 0; }
        else if (cat === "fruits_legumes") { document.getElementById('tp').value = 6; document.getElementById('tn').value = 0; }
        else if (cat === "produits_laitiers") { document.getElementById('tp').value = 4; document.getElementById('tn').value = 0; }
        else if (cat === "poissons") { document.getElementById('tp').value = 1; document.getElementById('tn').value = 0; }
        else if (cat === "congele") { document.getElementById('tp').value = 1; document.getElementById('tn').value = -18; }
        calculate();
    }

    function calculate() {
        const w = parseFloat(document.getElementById('rw').value);
        const h = parseFloat(document.getElementById('rh').value);
        const d = parseFloat(document.getElementById('rd').value);
        const tp = parseInt(document.getElementById('tp').value);
        const tn = parseInt(document.getElementById('tn').value);
        const roomCount = parseInt(document.getElementById('rooms-select').value);
        const cat = document.getElementById('category-select').value;
        
        document.getElementById('v-w').innerText = w.toFixed(1) + "m";
        document.getElementById('v-h').innerText = h.toFixed(1) + "m";
        document.getElementById('v-d').innerText = d.toFixed(1) + "m";
        document.getElementById('v-tp').innerText = tp + "°C";
        document.getElementById('v-tn').innerText = tn + "°C";
        
        const unitVolume = w * h * d;
        const totalVolume = unitVolume * roomCount;
        document.getElementById('total-v').innerText = totalVolume.toFixed(2);
        
        const surface = (2 * (w * h)) + (2 * (d * h)) + (2 * (w * d));
        document.getElementById('total-s').innerText = surface.toFixed(2);

        group.scale.set(w, h, d);
        group.position.y = h/2;

        if(cat === "congele" || tn < 0) {
            document.getElementById('main-t').innerText = tn + "°C";
            document.getElementById('temp-frame').style.borderColor = "#4444ff";
            chamber.material.color.setRGB(0.5, 0.7, 1.0);
        } else {
            document.getElementById('main-t').innerText = tp + "°C";
            document.getElementById('temp-frame').style.borderColor = "#ff4444";
            if (cat === "fruits_legumes") chamber.material.color.setRGB(0.4, 0.7, 0.4);
            else if (cat === "viande_rouge") chamber.material.color.setRGB(0.8, 0.4, 0.4);
            else chamber.material.color.setRGB(0.8, 0.8, 0.8);
        }
    }

    // MODIFICATION : Capture et inclusion automatique du schéma 3D
    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const wilaya = document.getElementById('wilaya-select').value;
        const roomCount = document.getElementById('rooms-select').value;
        const categoryText = document.getElementById('category-select').options[document.getElementById('category-select').selectedIndex].text;

        // Entête du Rapport Électronique
        doc.setFont("helvetica", "bold");
        doc.text("OxyONE - RAPPORT TECHNIQUE", 20, 20);
        doc.setFontSize(9); doc.setFont("helvetica", "normal");
        doc.text("Wilaya : " + wilaya, 20, 30);
        doc.text("Catégorie de Conservation : " + categoryText, 20, 35);
        doc.text("Nombre de chambres froides : " + roomCount, 20, 40);
        doc.text("Startup Labellisée@2021 | Ministère de l'Économie", 20, 45);
        doc.line(20, 48, 190, 48);
        
        // Données Dimensionnelles
        doc.text("Volume Global Total : " + document.getElementById('total-v').innerText + " m3", 20, 60);
        doc.text("Surface des Parois (par unité) : " + document.getElementById('total-s').innerText + " m2", 20, 65);
        doc.text("Dimensions Unitaires : L " + document.getElementById('v-w').innerText + " x H " + document.getElementById('v-h').innerText + " x P " + document.getElementById('v-d').innerText, 20, 70);
        doc.text("Consigne Température Cible : " + document.getElementById('main-t').innerText, 20, 75);
        
        // --- NOUVEAU : CAPTURE DU SCHÉMA 3D ---
        // Conversion de la zone de rendu Three.js en image JPEG (Base64)
        const image3D = renderer.domElement.toDataURL("image/jpeg", 0.8);
        
        // Insertion de l'image du schéma (X=20, Y=85, Largeur=170, Hauteur=100)
        doc.text("SCHÉMA DU MODÈLE NUMÉRIQUE (VUE SATELLITE 3D) :", 20, 90);
        doc.addImage(image3D, 'JPEG', 20, 95, 170, 100);
        
        // Sauvegarde du fichier
        doc.save("OxyONE_Fiche_Technique_" + wilaya + "_" + roomCount + "_chambres.pdf");
    }

    const ctxInternal = document.getElementById('internalAnalyticsChart').getContext('2d');
    new Chart(ctxInternal, {
        type: 'line',
        data: {
            labels: ['Mars', 'Avril', 'Mai', 'Juin'],
            datasets: [{
                label: 'Traction OxyONE',
                data: [45, 78, 112, 142],
                borderColor: '#ffaa00',
                backgroundColor: 'rgba(255, 170, 0, 0.05)',
                borderWidth: 2,
                tension: 0.35,
                pointRadius: 2
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#ffaa00', font: { size: 8 } } },
                y: { grid: { color: 'rgba(255,170,0,0.05)' }, ticks: { color: '#ffaa00', font: { size: 8 } } }
            }
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        group.rotation.x += vX; group.rotation.y += vY;
        renderer.render(scene, camera);
    }
    animate(); calculate();
</script>
</body>
</html>
